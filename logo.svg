<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F0D68A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F0D68A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- F Z monogram emblem -->
  <g transform="translate(30, 20)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <text x="40" y="58" font-family="'Playfair Display', Georgia, serif" font-size="48" font-weight="700" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="2">FZ</text>
  </g>
  <!-- Company Name -->
  <g transform="translate(130, 20)">
    <text x="0" y="38" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="4">FZ EVENTZ</text>
    <text x="0" y="62" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="300" fill="#C9A84C" letter-spacing="6">ARCHITECTURAL EVENT PRODUCTION</text>
    <!-- Gold underline accent -->
    <rect x="0" y="72" width="60" height="2" rx="1" fill="url(#goldGrad2)"/>
  </g>
</svg>
